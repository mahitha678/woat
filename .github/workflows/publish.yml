name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel twine virtualenv
          pip install build --no-deps
          pip install packaging
          pip install importlib_metadata
          
      - name: Create virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel

      - name: Prepare build environment
        run: |
          # Create README.md if it doesn't exist
          if [ ! -f README.md ] && [ -f readme.md ]; then
            cp readme.md README.md
          elif [ ! -f README.md ]; then
            echo "# WATBOT - WhatsApp & Instagram Automation Bot" > README.md
            echo "" >> README.md
            echo "WhatsApp & Instagram Automation Bot with AI-powered responses." >> README.md
          fi
          
          # List files to debug
          ls -la
          
      - name: Build package
        run: |
          source .venv/bin/activate
          # Install in editable mode first with --no-deps to avoid dependency conflicts
          pip install -e . --no-deps
          # Install dependencies in the virtual environment
          pip install -r requirements.txt --no-cache-dir
          # Then build the distribution
          python -m build
        env:
          PYTHONPATH: ${{ github.workspace }}
          PIP_NO_BINARY: :all:

      - name: Check package
        run: |
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true