name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel twine virtualenv
          pip install build --no-deps
          pip install packaging
          pip install importlib_metadata

      - name: Prepare build environment
        run: |
          # Create README.md if it doesn't exist
          if [ ! -f README.md ] && [ -f readme.md ]; then
            cp readme.md README.md
          elif [ ! -f README.md ]; then
            echo "# WATBOT - WhatsApp & Instagram Automation Bot" > README.md
            echo "" >> README.md
            echo "WhatsApp & Instagram Automation Bot with AI-powered responses." >> README.md
          fi
          
          # List files to debug
          ls -la
          
      - name: Build package
        run: |
          # Install in editable mode first
          python -m pip install -e .
          # Then build the distribution
          python -m build
        env:
          PYTHONPATH: /usr/lib/python3/dist-packages:${{ github.workspace }}

      - name: Check package
        run: |
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true