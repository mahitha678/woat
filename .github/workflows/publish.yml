name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel twine virtualenv
          pip install build --no-deps
          pip install packaging
          pip install importlib_metadata
          
      - name: Create virtual environment
        run: |
          # Create a clean virtual environment without system packages
          python -m venv .venv --clear --without-pip
          source .venv/bin/activate
          # Install pip into the virtual environment
          curl https://bootstrap.pypa.io/get-pip.py -o get-pip.py
          python get-pip.py --no-cache-dir
          # Install basic build requirements
          python -m pip install --no-cache-dir --upgrade pip setuptools wheel build twine

      - name: Prepare build environment
        run: |
          # Create README.md if it doesn't exist
          if [ ! -f README.md ] && [ -f readme.md ]; then
            cp readme.md README.md
          elif [ ! -f README.md ]; then
            echo "# WATBOT - WhatsApp & Instagram Automation Bot" > README.md
            echo "" >> README.md
            echo "WhatsApp & Instagram Automation Bot with AI-powered responses." >> README.md
          fi
          
          # List files to debug
          ls -la
          
      - name: Build package
        run: |
          source .venv/bin/activate
          # Ignore system site packages
          export PYTHONNOUSERSITE=1
          # Install dependencies without installing conflicting packages
          pip install --no-deps --ignore-installed typing-extensions
          pip install --no-deps --ignore-installed pydantic
          # Install other requirements while ignoring installed packages
          pip install -r requirements.txt --no-deps --ignore-installed
          # Install the package itself
          pip install -e . --no-deps
          # Then build the distribution
          python -m build --no-isolation
        env:
          PYTHONPATH: ${{ github.workspace }}
          PIP_NO_BINARY: typing-extensions,pydantic

      - name: Check package
        run: |
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true